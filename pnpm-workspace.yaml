# Dev-only native build scripts (from homebridge-config-ui-x tree) are not
# needed to build, lint or publish this plugin, so they are disabled to keep
# installs deterministic and quiet.
allowBuilds:
  '@homebridge/node-pty-prebuilt-multiarch': false
  '@nestjs/core': false
  '@scarf/scarf': false
  macos-temperature-sensor: false
  osx-temperature-sensor: false

# Pinned patched versions for vulnerable transitive (dev-only) dependencies.
# Caret targets keep each override within its major to avoid breaking tooling
# (e.g. eslint's ajv v6 code path). Remove entries once upstream deps update.
overrides:
  '@isaacs/brace-expansion@<=5.0.0': '^5.0.1'
  'ajv@<6.14.0': '^6.14.0'
  'ajv@>=7.0.0-alpha.0 <8.18.0': '^8.18.0'
  'brace-expansion@<1.1.13': '^1.1.13'
  'brace-expansion@>=2.0.0 <2.0.3': '^2.0.3'
  'diff@>=4.0.0 <4.0.4': '^4.0.4'
  'fast-uri@<=3.1.1': '^3.1.2'
  'flatted@<=3.4.1': '^3.4.2'
  'form-data@>=4.0.0 <4.0.6': '^4.0.6'
  'glob@>=11.0.0 <11.1.0': '^11.1.0'
  'handlebars@>=4.0.0 <4.7.9': '^4.7.9'
  'js-yaml@<=4.1.1': '^4.2.0'
  'minimatch@<3.1.4': '^3.1.4'
  'minimatch@>=9.0.0 <9.0.7': '^9.0.7'
  'minimatch@>=10.0.0 <10.2.3': '^10.2.3'
  'picomatch@<2.3.2': '^2.3.2'
  'socket.io-parser@>=4.0.0 <4.2.6': '^4.2.6'
  'tar@<=7.5.15': '^7.5.16'
  'tar-fs@>=2.0.0 <2.1.4': '^2.1.4'
  'ws@>=8.0.0 <8.21.0': '^8.21.0'
  'yaml@>=2.0.0 <2.8.3': '^2.8.3'
